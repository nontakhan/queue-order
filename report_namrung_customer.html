<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานลูกค้า - บจก. นำรุ่งเคหะภัณฑ์ (สำนักงานใหญ่)</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto p-4 sm:p-6 md:p-8">
        <header class="mb-6">
            <div class="flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center space-x-4">
                    <svg class="w-10 h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-6m4 6V7m4 10V4M5 20h14"></path></svg>
                    <div>
                        <h1 class="text-3xl md:text-4xl font-bold text-gray-800">รายงานลูกค้า</h1>
                        <p class="text-lg text-gray-600 -mt-1">บจก. นำรุ่งเคหะภัณฑ์ (สำนักงานใหญ่)</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <a href="reports.html" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-gray-300 transition">กลับหน้ารายงาน</a>
                    <a href="index.html" class="bg-blue-100 text-blue-800 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-200 transition">กลับหน้าหลัก</a>
                </div>
            </div>
        </header>

        <div class="bg-white p-4 rounded-xl shadow-sm mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                <div class="lg:col-span-2">
                    <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-1">ค้นหา DocNo / ชื่อลูกค้า</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg></div>
                        <input type="text" id="searchInput" placeholder="ค้นหา DocNo หรือชื่อลูกค้า..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>
                <div>
                    <label for="startDate" class="block text-sm font-medium text-gray-700 mb-1">จากวันที่</label>
                    <input type="date" id="startDate" class="w-full py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition px-3">
                </div>
                <div>
                    <label for="endDate" class="block text-sm font-medium text-gray-700 mb-1">ถึงวันที่</label>
                    <input type="date" id="endDate" class="w-full py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 transition px-3">
                </div>
                <div class="flex gap-2 md:col-span-2 lg:col-span-4 justify-end">
                    <button id="filterBtn" class="bg-blue-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-blue-600 transition w-full sm:w-auto">กรองข้อมูล</button>
                    <button id="clearFilterBtn" class="bg-gray-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-gray-600 transition w-full sm:w-auto">ล้างค่า</button>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">DocNo</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">วันที่เอกสาร</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">คลัง</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">ชื่อลูกค้า</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">ชื่อสินค้า</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider text-right">จำนวน</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">หน่วย</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">สถานะ</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">อัปเดตล่าสุด</th>
                            <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider text-center">จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="itemsTableBody" class="divide-y divide-gray-200"></tbody>
                </table>
            </div>
            <div id="tableStatus" class="p-6 text-center text-gray-500"></div>
        </div>
        <div id="paginationControls" class="flex justify-between items-center mt-6"></div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const API_FETCH_ITEMS = './api/fetch_items.php';
    const API_DELETE_ITEM = './api/delete_item.php';
    const REPORT_CUSTOMER_KEYWORD = 'นำรุ่งเคหะภัณฑ์สำนักงานใหญ่';
    const ITEMS_PER_PAGE = 20;

    const normalizeCustomerName = (value = '') => value
        .replace(/[\s().\u00A0]/g, '')
        .replace(/　/g, '')
        .trim();

    const isReportCustomer = (value = '') => normalizeCustomerName(value).includes(REPORT_CUSTOMER_KEYWORD);

    const tableBody = document.getElementById('itemsTableBody');
    const tableStatus = document.getElementById('tableStatus');
    const paginationControls = document.getElementById('paginationControls');
    const searchInput = document.getElementById('searchInput');
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const filterBtn = document.getElementById('filterBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');

    let currentPage = 1;
    let filteredItemsCache = [];

    const showLoading = () => {
        tableBody.innerHTML = '';
        paginationControls.innerHTML = '';
        tableStatus.innerHTML = `<div class="flex justify-center items-center py-10"><div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div><p class="ml-4 text-gray-600">กำลังโหลด...</p></div>`;
        tableStatus.classList.remove('hidden');
    };

    const showNoData = (message) => {
        tableBody.innerHTML = '';
        paginationControls.innerHTML = '';
        tableStatus.innerHTML = `<p class="py-10">${message}</p>`;
        tableStatus.classList.remove('hidden');
    };

    const hideStatus = () => {
        tableStatus.classList.add('hidden');
    };

    const renderPagination = (pagination) => {
        paginationControls.innerHTML = '';
        if (pagination.total_pages <= 1) return;

        const { current_page, total_pages, total_items, items_per_page } = pagination;
        const info = document.createElement('div');
        const startItem = (current_page - 1) * items_per_page + 1;
        const endItem = Math.min(startItem + items_per_page - 1, total_items);
        info.className = 'text-sm text-gray-600';
        info.innerText = `แสดง ${startItem} - ${endItem} จาก ${total_items}`;
        paginationControls.appendChild(info);

        const buttonsContainer = document.createElement('div');
        buttonsContainer.className = 'flex items-center space-x-2';

        const prevButton = document.createElement('button');
        prevButton.innerHTML = '&laquo;';
        prevButton.className = 'px-3 py-1 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50';
        if (current_page === 1) prevButton.disabled = true;
        prevButton.addEventListener('click', () => renderCurrentPage(current_page - 1));
        buttonsContainer.appendChild(prevButton);

        const pageInfo = document.createElement('span');
        pageInfo.className = 'px-3 py-1 text-sm font-semibold text-gray-700';
        pageInfo.innerText = `หน้า ${current_page}/${total_pages}`;
        buttonsContainer.appendChild(pageInfo);

        const nextButton = document.createElement('button');
        nextButton.innerHTML = '&raquo;';
        nextButton.className = 'px-3 py-1 text-sm font-medium text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-100 disabled:opacity-50';
        if (current_page >= total_pages) nextButton.disabled = true;
        nextButton.addEventListener('click', () => renderCurrentPage(current_page + 1));
        buttonsContainer.appendChild(nextButton);

        paginationControls.appendChild(buttonsContainer);
    };

    const renderTable = (items) => {
        hideStatus();
        tableBody.innerHTML = '';

        items.forEach(item => {
            const row = document.createElement('tr');
            row.className = 'hover:bg-blue-50 transition-colors duration-200';

            const docDate = item.docdate ? new Date(item.docdate).toLocaleDateString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit' }) : '';
            const lastUpdate = item.last_update ? new Date(item.last_update).toLocaleString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) + ' น.' : '-';
            const statusText = item.delivery_status && item.delivery_status.trim() !== '' ? item.delivery_status : 'รอตรวจรับ';
            const locationText = item.location_code ? `${item.location_code}${item.location ? ' - ' + item.location : ''}` : '-';

            row.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-800">${item.docno || ''}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${docDate}</td>
                <td class="px-6 py-4 text-sm text-gray-700">${locationText}</td>
                <td class="px-6 py-4 text-sm text-gray-700">${item.customer_name || 'N/A'}</td>
                <td class="px-6 py-4 text-sm text-gray-700">${item.cd_name || ''}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500 text-right">${parseFloat(item.qty || 0).toLocaleString()}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${item.unit || ''}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">${statusText}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${lastUpdate}</td>
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-center">
                    <button class="delete-btn bg-red-500 text-white px-3 py-1 rounded-lg text-xs font-semibold hover:bg-red-600 transition" data-docno="${item.docno || ''}" data-cdcode="${item.cd_code || ''}">ลบ</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    };

    const renderCurrentPage = (page = 1) => {
        currentPage = page;

        if (filteredItemsCache.length === 0) {
            showNoData('ไม่พบข้อมูลของลูกค้ารายนี้ตามเงื่อนไขที่กำหนด');
            return;
        }

        const totalItems = filteredItemsCache.length;
        const totalPages = Math.ceil(totalItems / ITEMS_PER_PAGE);
        const safePage = Math.min(Math.max(page, 1), totalPages);
        currentPage = safePage;
        const startIndex = (safePage - 1) * ITEMS_PER_PAGE;
        const pageItems = filteredItemsCache.slice(startIndex, startIndex + ITEMS_PER_PAGE);

        renderTable(pageItems);
        renderPagination({
            current_page: safePage,
            total_pages: totalPages,
            total_items: totalItems,
            items_per_page: ITEMS_PER_PAGE
        });
    };

    const fetchItems = async (page = 1) => {
        showLoading();
        currentPage = page;
        const params = new URLSearchParams({
            search: searchInput.value.trim(),
            page: 1,
            limit: 5000,
            include_excluded_customer: 1,
            include_all_status: 1,
            startDate: startDateInput.value,
            endDate: endDateInput.value
        });

        try {
            const response = await fetch(`${API_FETCH_ITEMS}?${params.toString()}`);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const result = await response.json();
            filteredItemsCache = result.success ? result.data.filter(item => isReportCustomer(item.customer_name || '')) : [];
            if (result.success && filteredItemsCache.length > 0) {
                renderCurrentPage(page);
            } else {
                showNoData('ไม่พบข้อมูลของลูกค้ารายนี้ตามเงื่อนไขที่กำหนด');
            }
        } catch (error) {
            console.error('Fetch error:', error);
            showNoData('เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์');
        }
    };

    const handleDeleteItem = async (button) => {
        const { docno, cdcode } = button.dataset;
        const result = await Swal.fire({
            title: 'ยืนยันการลบ?',
            text: `ต้องการลบ DocNo: ${docno} ใช่หรือไม่?`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#6b7280',
            confirmButtonText: 'ใช่, ลบรายการ',
            cancelButtonText: 'ยกเลิก'
        });

        if (!result.isConfirmed) {
            return;
        }

        try {
            const formData = new FormData();
            formData.append('docno', docno);
            formData.append('cd_code', cdcode);

            const response = await fetch(API_DELETE_ITEM, {
                method: 'POST',
                body: formData
            });
            const resData = await response.json();

            if (!response.ok || !resData.success) {
                throw new Error(resData.message || 'ไม่สามารถลบข้อมูลได้');
            }

            filteredItemsCache = filteredItemsCache.filter(item => !(item.docno === docno && item.cd_code === cdcode));

            if (filteredItemsCache.length === 0) {
                showNoData('ไม่พบข้อมูลของลูกค้ารายนี้ตามเงื่อนไขที่กำหนด');
            } else {
                const totalPages = Math.ceil(filteredItemsCache.length / ITEMS_PER_PAGE);
                renderCurrentPage(Math.min(currentPage, totalPages));
            }

            await Swal.fire('สำเร็จ!', 'ลบรายการเรียบร้อยแล้ว', 'success');
        } catch (error) {
            await Swal.fire('เกิดข้อผิดพลาด', error.message || 'ไม่สามารถลบข้อมูลได้', 'error');
        }
    };

    let searchTimeout;
    searchInput.addEventListener('keyup', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => fetchItems(1), 300);
    });

    filterBtn.addEventListener('click', () => fetchItems(1));
    clearFilterBtn.addEventListener('click', () => {
        searchInput.value = '';
        startDateInput.value = '';
        endDateInput.value = '';
        fetchItems(1);
    });

    tableBody.addEventListener('click', (event) => {
        const deleteButton = event.target.closest('.delete-btn');
        if (deleteButton) {
            handleDeleteItem(deleteButton);
        }
    });

    fetchItems();
});
</script>
</body>
</html>
