<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คิวออเดอร์ - ประวัติรายการ</title>
    <link rel="icon" href="favicon.ico" sizes="any">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#16a34a">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .loader { border-top-color: #16a34a; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .item-row { cursor: pointer; }
        .page-grid {
            background-image: linear-gradient(rgba(15,23,42,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(15,23,42,0.05) 1px, transparent 1px);
            background-size: 28px 28px;
        }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">
    <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_top_left,_rgba(34,197,94,0.10),_transparent_28%),radial-gradient(circle_at_bottom_right,_rgba(59,130,246,0.10),_transparent_34%),linear-gradient(160deg,_#f8fafc_0%,_#eff6ff_46%,_#f8fafc_100%)]"></div>
    <div class="page-grid pointer-events-none fixed inset-0 opacity-60"></div>

    <!-- Item Details Modal -->
    <div id="detailsModal" class="fixed inset-0 bg-gray-900 bg-opacity-75 flex items-center justify-center z-50 hidden">
        <div class="mx-4 max-h-[90vh] w-full max-w-3xl overflow-y-auto rounded-[2rem] border border-slate-200/80 bg-white/95 p-6 text-slate-900 shadow-2xl shadow-slate-200/80 backdrop-blur md:p-8" id="detailsModalContent">
            <div class="flex justify-between items-center mb-6 border-b pb-4">
                <h2 class="text-2xl font-bold text-slate-900 flex items-center">
                    <svg class="w-6 h-6 mr-3 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    รายละเอียดรายการ
                </h2>
                <button id="closeDetailsModal" class="text-slate-400 hover:text-slate-700 transition-colors text-3xl leading-none">&times;</button>
            </div>
            <div id="detailsContent" class="space-y-4">
                <!-- Details will be loaded here -->
            </div>
        </div>
    </div>

    <div class="relative mx-auto max-w-7xl p-4 sm:p-6 md:p-8">
        <header class="mb-6">
            <div class="rounded-[2rem] border border-slate-200/80 bg-white/85 p-6 shadow-xl shadow-slate-200/70 ring-1 ring-white/60 backdrop-blur md:p-8">
            <div class="flex items-center space-x-4">
                 <a href="index.html" class="text-slate-500 hover:text-slate-800" title="กลับหน้าหลัก">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 15l-3-3m0 0l3-3m-3 3h8M3 12a9 9 0 1118 0 9 9 0 01-18 0z"></path></svg>
                </a>
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                <div>
                    <p class="mb-2 text-xs font-semibold uppercase tracking-[0.3em] text-emerald-500">Queue Order System</p>
                    <h1 class="text-3xl md:text-4xl font-bold text-slate-900">คิวออเดอร์</h1>
                    <p id="pageTitle" class="text-base text-slate-600 md:text-lg">ประวัติรายการ</p>
                    <div id="locationDisplay" class="mt-2"></div>
                </div>
            </div></div>
        </header>

        <div id="mainContent">
            <div class="mb-6 rounded-[1.75rem] border border-slate-200/80 bg-white/95 p-5 text-slate-900 shadow-xl shadow-slate-200/70 backdrop-blur md:p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-end">
                    <div class="lg:col-span-2">
                        <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-1">ค้นหา DocNo / ชื่อลูกค้า</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"><svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" /></svg></div>
                            <input type="text" id="searchInput" placeholder="ค้นหา DocNo หรือชื่อลูกค้า..." class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition">
                        </div>
                    </div>
                    <div>
                        <label for="startDate" class="block text-sm font-medium text-gray-700 mb-1">จากวันที่</label>
                        <input type="date" id="startDate" class="w-full py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition px-3">
                    </div>
                    <div>
                        <label for="endDate" class="block text-sm font-medium text-gray-700 mb-1">ถึงวันที่</label>
                        <input type="date" id="endDate" class="w-full py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 transition px-3">
                    </div>
                    <div class="flex gap-2 md:col-span-2 lg:col-span-4 justify-end">
                         <button id="filterBtn" class="bg-green-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-green-600 transition w-full sm:w-auto">กรองข้อมูล</button>
                         <button id="clearFilterBtn" class="bg-gray-500 text-white px-6 py-2 rounded-lg font-semibold hover:bg-gray-600 transition w-full sm:w-auto">ล้างค่า</button>
                    </div>
                </div>
            </div>

            <div class="overflow-hidden rounded-[1.75rem] border border-slate-200/80 bg-white/95 text-slate-900 shadow-xl shadow-slate-200/70 backdrop-blur">
                <div id="bulkDeleteToolbar" class="hidden border-b border-slate-200 bg-red-50/80 px-4 py-3 sm:px-6">
                    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                        <label class="inline-flex items-center gap-3 text-sm font-semibold text-red-800">
                            <input id="selectAllCancelledItems" type="checkbox" class="h-5 w-5 rounded border-red-300 text-red-600 focus:ring-red-500">
                            <span>เลือกทั้งหมดในหน้านี้</span>
                        </label>
                        <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
                            <span id="selectedCancelledCount" class="text-sm font-medium text-red-700">เลือกแล้ว 0 รายการ</span>
                            <button id="bulkDeleteBtn" type="button" class="inline-flex items-center justify-center rounded-lg bg-red-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-red-400 focus:ring-offset-1 disabled:cursor-not-allowed disabled:opacity-50" disabled>ลบรายการที่เลือก</button>
                        </div>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead id="tableHeader" class="bg-gray-50 border-b border-gray-200">
                            <tr>
                                <th id="selectHeaderCell" class="hidden w-12 px-4 py-3 text-center">
                                    <span class="sr-only">เลือก</span>
                                </th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">DocNo</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">วันที่เอกสาร</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">ชื่อลูกค้า</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">ชื่อสินค้า</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider text-right">จำนวน</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">หน่วย</th>
                                <th class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider">อัปเดตล่าสุด / หมายเหตุ</th>
                                <th id="manageHeaderCell" class="px-6 py-3 text-xs font-semibold text-gray-600 uppercase tracking-wider text-center hidden">จัดการ</th>
                            </tr>
                        </thead>
                        <tbody id="itemsTableBody" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
                <div id="tableStatus" class="p-6 text-center text-gray-500"></div>
            </div>
            <div id="paginationControls" class="flex justify-between items-center mt-6"></div>
        </div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const pageTitle = document.getElementById('pageTitle');
    const locationDisplay = document.getElementById('locationDisplay');
    const tableBody = document.getElementById('itemsTableBody');
    const tableStatus = document.getElementById('tableStatus');
    const searchInput = document.getElementById('searchInput');
    const paginationControls = document.getElementById('paginationControls');
    const startDateInput = document.getElementById('startDate');
    const endDateInput = document.getElementById('endDate');
    const filterBtn = document.getElementById('filterBtn');
    const clearFilterBtn = document.getElementById('clearFilterBtn');
    const detailsModal = document.getElementById('detailsModal');
    const detailsContent = document.getElementById('detailsContent');
    const closeDetailsModal = document.getElementById('closeDetailsModal');
    const manageHeaderCell = document.getElementById('manageHeaderCell');
    const selectHeaderCell = document.getElementById('selectHeaderCell');
    const bulkDeleteToolbar = document.getElementById('bulkDeleteToolbar');
    const selectAllCancelledItems = document.getElementById('selectAllCancelledItems');
    const selectedCancelledCount = document.getElementById('selectedCancelledCount');
    const bulkDeleteBtn = document.getElementById('bulkDeleteBtn');

    const API_FETCH_ITEMS = './api/fetch_items.php';
    const API_GET_DETAILS = './api/get_item_details.php';
    const API_UPDATE_STATUS = './api/update_status.php';
    const API_DELETE_ITEM = './api/delete_item.php';
    const API_GET_LOCATION_EMPLOYEES = './api/get_location_employees.php';

    let selectedLocation = null;
    let selectedStatus = null;
    let locationName = '';
    let currentPage = 1;
    let locationEmployees = null;
    const selectedCancelledItems = new Map();
    const CANCELLED_STATUS = 'ยกเลิก';
    const EXCLUDED_CUSTOMER_KEYWORD = 'นำรุ่งเคหะภัณฑ์สำนักงานใหญ่';

    const normalizeCustomerName = (value = '') => value
        .replace(/[\s().]/g, '')
        .replace(/　/g, '')
        .trim();

    const isExcludedCustomer = (value = '') => normalizeCustomerName(value).includes(EXCLUDED_CUSTOMER_KEYWORD);

    const formatQty = (value) => {
        const number = parseFloat(value);
        if (!Number.isFinite(number)) {
            return '0';
        }
        return Number.isInteger(number)
            ? number.toLocaleString()
            : number.toLocaleString(undefined, { maximumFractionDigits: 3 });
    };

    const escapeHtml = (value) => {
        if (value === null || value === undefined) {
            return '';
        }
        return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    };

    const buildReceiveProgressHTML = (item) => {
        const totalQty = Number.parseFloat(item.qty || 0);
        const receivedQty = parseFloat(item.received_qty_total || 0);
        const receivedCount = Number.parseInt(item.received_count || 0, 10);
        if (!Number.isFinite(totalQty) || !Number.isFinite(receivedQty) || receivedQty <= 0) {
            return '';
        }
        if (item.delivery_status === 'รับแล้ว' && (!Number.isFinite(receivedCount) || receivedCount <= 1)) {
            return '';
        }

        const unit = escapeHtml(item.unit || '');
        const progressPercent = totalQty > 0 ? Math.min(100, (receivedQty / totalQty) * 100) : 100;

        return `
            <div class="mt-2 min-w-[10rem]">
                <div class="mb-1 text-xs font-semibold text-green-700">รับแล้ว ${formatQty(receivedQty)} / ${formatQty(totalQty)} ${unit}</div>
                <div class="h-2 w-full overflow-hidden rounded-full bg-gray-200">
                    <div class="h-full rounded-full bg-green-500" style="width: ${progressPercent}%"></div>
                </div>
            </div>
        `;
    };

    const buildReceiveHistoryHTML = (item) => {
        const history = Array.isArray(item.receive_history) ? item.receive_history : [];
        const unit = escapeHtml(item.Lname_unit || item.unit || '');
        const historyRows = history.length > 0
            ? history.map((entry, index) => {
                const receivedAt = entry.received_at
                    ? `${new Date(entry.received_at).toLocaleString('th-TH', { day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' })} น.`
                    : '-';
                return `
                    <div class="rounded-xl border border-orange-100 bg-orange-50/70 p-3">
                        <div class="flex flex-wrap items-center justify-between gap-2">
                            <p class="font-bold text-orange-800">ครั้งที่ ${index + 1}</p>
                            <p class="font-semibold text-slate-800">${formatQty(entry.received_qty)} ${unit}</p>
                        </div>
                        <div class="mt-1 grid grid-cols-1 gap-1 text-xs text-slate-600 md:grid-cols-2">
                            <p>ผู้รับ: <span class="font-semibold">${escapeHtml(entry.received_by_employee || '-')}</span></p>
                            <p>เวลา: <span class="font-semibold">${escapeHtml(receivedAt)}</span></p>
                        </div>
                    </div>
                `;
            }).join('')
            : '<p class="rounded-xl bg-slate-50 p-3 text-sm font-semibold text-slate-500">ยังไม่มีประวัติการรับแบบแยกครั้ง</p>';

        return `
            <section>
                <h3 class="text-lg font-semibold text-gray-700 border-b mt-4 mb-3 pb-2">ประวัติการรับสินค้า</h3>
                <div class="space-y-3">${historyRows}</div>
            </section>
        `;
    };

    const getUrlParams = () => {
        const params = new URLSearchParams(window.location.search);
        selectedLocation = params.get('location');
        selectedStatus = params.get('status') ? params.get('status').trim() : null;
        locationName = params.get('location_name') || selectedLocation;
    };

    const updateHeader = () => {
        pageTitle.textContent = `ประวัติรายการ: ${selectedStatus}`;
        const statusColors = { 'รับแล้ว': 'bg-green-100 text-green-800', 'เลื่อน': 'bg-yellow-100 text-yellow-800', 'รับบางส่วน': 'bg-orange-100 text-orange-800', 'ยกเลิก': 'bg-red-100 text-red-800' };
        const colorClass = statusColors[selectedStatus] || 'bg-gray-100 text-gray-800';
        locationDisplay.innerHTML = `<div class="inline-flex items-center px-4 py-2 ${colorClass} rounded-lg shadow-sm"><svg class="w-6 h-6 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg><div><span class="text-sm font-medium">คลัง</span><strong class="block text-xl font-bold">${escapeHtml(locationName)}</strong></div></div>`;
        
        if (selectedStatus === 'รับแล้ว' || selectedStatus === 'เลื่อน' || selectedStatus === 'รับบางส่วน' || selectedStatus === CANCELLED_STATUS) {
            manageHeaderCell.classList.remove('hidden');
        } else {
            manageHeaderCell.classList.add('hidden');
        }

        const isCancelledPage = selectedStatus === CANCELLED_STATUS;
        bulkDeleteToolbar.classList.toggle('hidden', !isCancelledPage);
        selectHeaderCell.classList.toggle('hidden', !isCancelledPage);
    };

    const actionButtonClass = 'inline-flex items-center justify-center rounded-lg px-3 py-2 text-xs font-semibold transition focus:outline-none focus:ring-2 focus:ring-offset-1 disabled:cursor-not-allowed disabled:opacity-50';
    const paginationButtonClass = 'inline-flex h-9 min-w-9 items-center justify-center rounded-lg border border-gray-300 bg-white px-3 text-sm font-medium text-gray-600 transition hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-green-400 disabled:cursor-not-allowed disabled:opacity-50';
    const showLoading = () => { tableBody.innerHTML = ''; paginationControls.innerHTML = ''; tableStatus.innerHTML = `<div class="flex justify-center items-center py-10"><div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div><p class="ml-4 text-gray-600">กำลังโหลด...</p></div>`; tableStatus.classList.remove('hidden'); };
    const showNoData = (message) => { selectedCancelledItems.clear(); updateBulkDeleteState(); tableBody.innerHTML = ''; paginationControls.innerHTML = ''; tableStatus.innerHTML = `<p class="py-10">${escapeHtml(message)}</p>`; tableStatus.classList.remove('hidden'); };
    const hideStatus = () => { tableBody.innerHTML = ''; tableStatus.classList.add('hidden'); };

    const getItemKey = ({ docno = '', subId = '', cdcode = '', locationCode = '', unit = '', price = '' }) => [docno, subId, cdcode, locationCode, unit, price].join('||');

    const updateBulkDeleteState = () => {
        const selectedCount = selectedCancelledItems.size;
        selectedCancelledCount.textContent = `เลือกแล้ว ${selectedCount} รายการ`;
        bulkDeleteBtn.disabled = selectedCount === 0;

        const checkboxes = Array.from(tableBody.querySelectorAll('.cancelled-select-checkbox'));
        const checkedCount = checkboxes.filter((checkbox) => checkbox.checked).length;
        selectAllCancelledItems.checked = checkboxes.length > 0 && checkedCount === checkboxes.length;
        selectAllCancelledItems.indeterminate = checkedCount > 0 && checkedCount < checkboxes.length;
    };

    const fetchLocationEmployees = async () => {
        if (!selectedLocation) {
            return [];
        }

        if (locationEmployees) {
            return locationEmployees;
        }

        const response = await fetch(`${API_GET_LOCATION_EMPLOYEES}?location_code=${encodeURIComponent(selectedLocation)}`);
        if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
        }

        const result = await response.json();
        if (!result.success) {
            throw new Error(result.message || 'ไม่สามารถโหลดรายชื่อพนักงานได้');
        }

        locationEmployees = Array.isArray(result.data) ? result.data : [];
        return locationEmployees;
    };

    const promptReceivingEmployee = async () => {
        const employees = await fetchLocationEmployees();

        if (employees.length === 0) {
            await Swal.fire({
                icon: 'warning',
                title: 'ยังไม่มีรายชื่อเจ้าหน้าที่',
                text: `ยังไม่ได้ตั้งค่าพนักงานประจำคลัง ${selectedLocation} กรุณาเพิ่มข้อมูลในหน้าจัดการก่อน`,
                confirmButtonColor: '#16a34a'
            });
            return null;
        }

        return new Promise((resolve) => {
            const employeeButtons = employees.map((employee) => `
                <button
                    type="button"
                    id="employee-${employee.id}"
                    class="rounded-xl border border-green-200 bg-green-50 px-4 py-3 text-left text-sm font-semibold text-green-800 transition hover:border-green-300 hover:bg-green-100"
                >
                    ${escapeHtml(employee.employee_name)}
                </button>
            `).join('');

            Swal.fire({
                title: 'เลือกเจ้าหน้าที่ประจำคลัง',
                html: `
                    <div class="mb-4 text-sm text-slate-500">เลือกชื่อเจ้าหน้าที่ที่รับสินค้าให้ลูกค้า</div>
                    <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">${employeeButtons}</div>
                `,
                showConfirmButton: false,
                showCancelButton: true,
                cancelButtonText: 'ยกเลิก',
                width: '42rem',
                didOpen: () => {
                    employees.forEach((employee) => {
                        const element = document.getElementById(`employee-${employee.id}`);
                        if (!element) return;
                        element.addEventListener('click', () => {
                            Swal.close();
                            resolve(employee);
                        });
                    });
                }
            }).then((result) => {
                if (result.dismiss) {
                    resolve(null);
                }
            });
        });
    };

    const promptReceiveQuantity = async ({ totalQty, receivedQty, unit }) => {
        const total = parseFloat(totalQty || 0);
        const received = parseFloat(receivedQty || 0);
        const safeTotal = Number.isFinite(total) ? total : 0;
        const safeReceived = Number.isFinite(received) ? received : 0;
        const remaining = Math.max(0, safeTotal - safeReceived);
        const rawRemaining = Number.isInteger(remaining) ? String(remaining) : String(parseFloat(remaining.toFixed(3)));
        const unitLabel = escapeHtml(unit || '');

        const { value } = await Swal.fire({
            title: 'ระบุจำนวนที่รับ',
            html: `
                <div class="space-y-4 text-left">
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="rounded-xl bg-slate-50 p-3">
                            <div class="text-xs text-slate-500">ทั้งหมด</div>
                            <div class="text-lg font-bold text-slate-800">${formatQty(safeTotal)} ${unitLabel}</div>
                        </div>
                        <div class="rounded-xl bg-green-50 p-3">
                            <div class="text-xs text-green-700">รับแล้ว</div>
                            <div class="text-lg font-bold text-green-800">${formatQty(safeReceived)} ${unitLabel}</div>
                        </div>
                        <div class="rounded-xl bg-yellow-50 p-3">
                            <div class="text-xs text-yellow-700">คงเหลือ</div>
                            <div class="text-lg font-bold text-yellow-800">${formatQty(remaining)} ${unitLabel}</div>
                        </div>
                    </div>
                    <input id="receiveQtyInput" type="text" inputmode="decimal" class="w-full rounded-xl border border-green-200 px-4 py-3 text-right text-2xl font-bold text-slate-800 focus:border-green-500 focus:outline-none" value="${rawRemaining}" autocomplete="off">
                    <div class="grid grid-cols-3 gap-2">
                        ${['7','8','9','4','5','6','1','2','3','.','0','⌫'].map((key) => `
                            <button type="button" class="receive-calc-btn rounded-xl border border-slate-200 bg-white py-3 text-lg font-bold text-slate-700 transition hover:bg-slate-50" data-key="${key}">${key}</button>
                        `).join('')}
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" id="receiveQtyClear" class="rounded-xl border border-red-200 bg-red-50 py-3 text-sm font-semibold text-red-700 transition hover:bg-red-100">ล้าง</button>
                        <button type="button" id="receiveQtyAll" class="rounded-xl border border-green-200 bg-green-50 py-3 text-sm font-semibold text-green-800 transition hover:bg-green-100">รับทั้งหมดที่เหลือ</button>
                    </div>
                </div>
            `,
            showCancelButton: true,
            confirmButtonText: 'ยืนยันจำนวนรับ',
            cancelButtonText: 'ยกเลิก',
            confirmButtonColor: '#16a34a',
            width: '34rem',
            focusConfirm: false,
            didOpen: () => {
                const input = document.getElementById('receiveQtyInput');
                const setValue = (nextValue) => {
                    input.value = nextValue.replace(/[^0-9.]/g, '').replace(/(\..*)\./g, '$1');
                    input.focus();
                };

                input.focus();
                input.select();
                document.querySelectorAll('.receive-calc-btn').forEach((button) => {
                    button.addEventListener('click', () => {
                        const key = button.dataset.key;
                        if (key === '⌫') {
                            setValue(input.value.slice(0, -1));
                            return;
                        }
                        setValue(`${input.value}${key}`);
                    });
                });
                document.getElementById('receiveQtyClear')?.addEventListener('click', () => setValue(''));
                document.getElementById('receiveQtyAll')?.addEventListener('click', () => setValue(rawRemaining));
            },
            preConfirm: () => {
                const input = document.getElementById('receiveQtyInput');
                const enteredQty = parseFloat(input?.value || 0);
                if (!Number.isFinite(enteredQty) || enteredQty <= 0) {
                    Swal.showValidationMessage('กรุณาระบุจำนวนที่รับมากกว่า 0');
                    return false;
                }
                if (enteredQty - remaining > 0.0001) {
                    Swal.showValidationMessage(`จำนวนที่รับต้องไม่เกินคงเหลือ ${formatQty(remaining)} ${unitLabel}`);
                    return false;
                }
                return enteredQty;
            }
        });

        return typeof value === 'number' ? value : null;
    };
    
    const fetchItems = async (page = 1) => {
        if (!selectedLocation || !selectedStatus) {
            showNoData('ไม่สามารถโหลดข้อมูลได้: กรุณาระบุคลังและสถานะ');
            return;
        }
        showLoading();
        currentPage = page;
        const searchTerm = searchInput.value.trim();
        const startDate = startDateInput.value;
        const endDate = endDateInput.value;
        selectedCancelledItems.clear();
        updateBulkDeleteState();

        try {
            const params = new URLSearchParams({
                search: searchTerm,
                page: page,
                location: selectedLocation,
                status: selectedStatus,
                startDate: startDate,
                endDate: endDate
            });
            const apiUrl = `${API_FETCH_ITEMS}?${params.toString()}`;
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const result = await response.json();
            const filteredItems = result.success ? result.data.filter(item => !isExcludedCustomer(item.customer_name || '')) : [];
            if (result.success && filteredItems.length > 0) {
                renderTable(filteredItems);
                renderPagination(result.pagination);
            } else {
                showNoData(searchTerm || startDate || endDate ? `ไม่พบรายการตามเงื่อนไขที่กำหนด` : `ไม่มีรายการสถานะ "${selectedStatus}" ในคลังนี้`);
            }
        } catch (error) {
            console.error('Fetch error:', error);
            showNoData('เกิดข้อผิดพลาดในการเชื่อมต่อกับเซิร์ฟเวอร์');
        }
    };

    const renderPagination = (pagination) => {
        paginationControls.innerHTML = '';
        if (pagination.total_pages <= 1) return;
        const { current_page, total_pages, total_items, items_per_page } = pagination;
        const info = document.createElement('div');
        const startItem = (current_page - 1) * items_per_page + 1;
        const endItem = Math.min(startItem + items_per_page - 1, total_items);
        info.className = 'text-sm text-gray-600';
        info.innerText = `แสดง ${startItem} - ${endItem} จาก ${total_items}`;
        paginationControls.appendChild(info);
        const buttonsContainer = document.createElement('div');
        buttonsContainer.className = 'flex items-center space-x-2';
        const prevButton = document.createElement('button');
        prevButton.innerHTML = '&laquo;';
        prevButton.type = 'button';
        prevButton.className = paginationButtonClass;
        if (current_page === 1) prevButton.disabled = true;
        prevButton.addEventListener('click', () => fetchItems(current_page - 1));
        buttonsContainer.appendChild(prevButton);
        const pageInfo = document.createElement('span');
        pageInfo.className = 'px-3 py-1 text-sm font-semibold text-gray-700';
        pageInfo.innerText = `หน้า ${current_page}/${total_pages}`;
        buttonsContainer.appendChild(pageInfo);
        const nextButton = document.createElement('button');
        nextButton.innerHTML = '&raquo;';
        nextButton.type = 'button';
        nextButton.className = paginationButtonClass;
        if (current_page >= total_pages) nextButton.disabled = true;
        nextButton.addEventListener('click', () => fetchItems(current_page + 1));
        buttonsContainer.appendChild(nextButton);
        paginationControls.appendChild(buttonsContainer);
    };

    const handleUpdateStatus = async (button) => {
        const { docno, cdcode, status } = button.dataset;
        const row = button.closest('tr');
        const actionLabel = button.dataset.actionLabel || `เปลี่ยนสถานะเป็น "${status}"`;
        const successMessage = status === '' ? 'ย้อนกลับไปรอรับเรียบร้อยแล้ว' : 'อัปเดตสถานะเรียบร้อยแล้ว';
        let receivedByEmployee = null;
        let receivedQty = null;

        if (status === 'รับแล้ว') {
            const totalQty = parseFloat(row?.dataset.qty || 0);
            const currentReceivedQty = parseFloat(row?.dataset.receivedQty || 0);
            const safeTotalQty = Number.isFinite(totalQty) ? totalQty : 0;
            const safeCurrentReceivedQty = Number.isFinite(currentReceivedQty) ? currentReceivedQty : 0;
            const remainingQty = Math.max(0, safeTotalQty - safeCurrentReceivedQty);

            if (remainingQty <= 0.0001) {
                await Swal.fire({
                    icon: 'warning',
                    title: 'รับครบแล้ว',
                    text: 'รายการนี้ไม่มีจำนวนคงเหลือให้รับเพิ่ม',
                    confirmButtonColor: '#16a34a'
                });
                return;
            }

            const selectedEmployee = await promptReceivingEmployee();
            if (!selectedEmployee) {
                return;
            }
            receivedByEmployee = selectedEmployee.employee_name;

            receivedQty = await promptReceiveQuantity({
                totalQty: safeTotalQty,
                receivedQty: safeCurrentReceivedQty,
                unit: row?.dataset.unit || ''
            });
            if (receivedQty === null) {
                return;
            }
        }

        Swal.fire({ 
            title: 'ยืนยันการอัปเดต?', 
            text: `ต้องการ${actionLabel} DocNo: ${docno} ใช่หรือไม่?`, 
            icon: 'question', 
            showCancelButton: true, 
            confirmButtonColor: '#16a34a', 
            cancelButtonColor: '#ef4444', 
            confirmButtonText: 'ใช่, ยืนยัน', 
            cancelButtonText: 'ยกเลิก' 
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    const formData = new FormData();
                    formData.append('docno', docno);
                    formData.append('sub_id', row?.dataset.subId || '');
                    formData.append('cd_code', cdcode);
                    formData.append('new_status', status);
                    formData.append('location_code', row?.dataset.locationCode || selectedLocation || '');
                    formData.append('unit', row?.dataset.unit || '');
                    formData.append('price', row?.dataset.price || '');
                    if (receivedByEmployee) {
                        formData.append('received_by_employee', receivedByEmployee);
                    }
                    if (receivedQty !== null) {
                        formData.append('received_qty', receivedQty);
                    }
                    const response = await fetch(API_UPDATE_STATUS, { method: 'POST', body: formData });
                    const resData = await response.json();
                    if (resData.success) {
                        Swal.fire('สำเร็จ!', successMessage, 'success');
                        fetchItems(currentPage);
                    } else { throw new Error(resData.message || 'ไม่สามารถอัปเดตข้อมูลได้'); }
                } catch (error) { Swal.fire('เกิดข้อผิดพลาด!', error.message, 'error'); }
            }
        });
    };

        }).then(async (result) => {

    const handleBulkDelete = async () => {
        const items = Array.from(selectedCancelledItems.values());

            return;

        const result = await Swal.fire({
            title: 'ยืนยันการลบรายการที่เลือก?',
            text: `ต้องการลบรายการสถานะยกเลิก ${items.length} รายการออกจากระบบอย่างถาวร`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#d33',
            cancelButtonColor: '#3085d6',
            confirmButtonText: 'ใช่, ลบรายการที่เลือก',
            cancelButtonText: 'ยกเลิก'
        });

        if (!result.isConfirmed) {
            return;
        }

        bulkDeleteBtn.disabled = true;
        try {
            Swal.fire({
                title: 'กำลังลบรายการ...',
                text: `กำลังลบ 0/${items.length} รายการ`,
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            for (let index = 0; index < items.length; index += 1) {
                await deleteItem(items[index]);
                Swal.update({ text: `กำลังลบ ${index + 1}/${items.length} รายการ` });
            }

            selectedCancelledItems.clear();
            await Swal.fire('ลบแล้ว!', `ลบรายการที่เลือกเรียบร้อยแล้ว ${items.length} รายการ`, 'success');
            fetchItems(currentPage);
        } catch (error) {
            await Swal.fire('เกิดข้อผิดพลาด!', error.message, 'error');
            updateBulkDeleteState();
        }
    };

    let searchTimeout;
    searchInput.addEventListener('keyup', () => { 
        clearTimeout(searchTimeout); 
        searchTimeout = setTimeout(() => { 
            fetchItems(1);
        }, 300); 
    });

    filterBtn.addEventListener('click', () => {
        fetchItems(1);
    });

    clearFilterBtn.addEventListener('click', () => {
        startDateInput.value = '';
        endDateInput.value = '';
        searchInput.value = '';
        fetchItems(1);
    });

    selectAllCancelledItems.addEventListener('change', () => {
        const checkboxes = Array.from(tableBody.querySelectorAll('.cancelled-select-checkbox'));
        checkboxes.forEach((checkbox) => {
            checkbox.checked = selectAllCancelledItems.checked;
            const item = {
                docno: checkbox.dataset.docno || '',
                subId: checkbox.dataset.subId || '',
                cdcode: checkbox.dataset.cdcode || '',
                locationCode: checkbox.dataset.locationCode || selectedLocation || '',
                unit: checkbox.dataset.unit || '',
                price: checkbox.dataset.price || ''
            };
            if (checkbox.checked) {
                selectedCancelledItems.set(checkbox.dataset.key, item);
            } else {
                selectedCancelledItems.delete(checkbox.dataset.key);
            }
        });
        updateBulkDeleteState();
    });

    bulkDeleteBtn.addEventListener('click', handleBulkDelete);
    
    tableBody.addEventListener('click', (e) => {
        const checkbox = e.target.closest('.cancelled-select-checkbox');
        if (checkbox) {
            const item = {
                docno: checkbox.dataset.docno || '',
                subId: checkbox.dataset.subId || '',
                cdcode: checkbox.dataset.cdcode || '',
                locationCode: checkbox.dataset.locationCode || selectedLocation || '',
                unit: checkbox.dataset.unit || '',
                price: checkbox.dataset.price || ''
            };
            if (checkbox.checked) {
                selectedCancelledItems.set(checkbox.dataset.key, item);
            } else {
                selectedCancelledItems.delete(checkbox.dataset.key);
            }
            updateBulkDeleteState();
            return;
        }

        const updateBtn = e.target.closest('.update-btn');
        if (updateBtn) {
            handleUpdateStatus(updateBtn);
            return;
        }

        const deleteBtn = e.target.closest('.delete-btn');
        if (deleteBtn) {
            handleDeleteItem(deleteBtn);
            return;
        }

        const row = e.target.closest('.item-row');
        if (row) {
            showItemDetailsModal(row.dataset);
        }
    });

    closeDetailsModal.addEventListener('click', () => {
        detailsModal.classList.add('hidden');
    });

    detailsModal.addEventListener('click', (e) => {
        if (e.target.id === 'detailsModal') {
            detailsModal.classList.add('hidden');
        }
    });
    
    // --- Initial Load ---
    getUrlParams();
    updateHeader();
    fetchItems();
});
</script>

</body>
</html>
